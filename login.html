  <script type="module">
    import * as THREE from '/node_modules/three/build/three.module.js';

    (function initColorBends() {
      const container = document.getElementById('color-bends-bg');
      if (!container) {
        return;
      }

      const colorBendsConfig = {
        colors: ['#ff0000', '#00ff00', '#0000ff'],
        rotation: -106,
        speed: 0.35,
        scale: 1,
        frequency: 1,
        warpStrength: 0.95,
        mouseInfluence: 0.1,
        parallax: 0.5,
        noise: 0.1,
        transparent: true,
        autoRotate: 0.3,
        color: '',
      };
      const introParamConfig = {
        delayMs: 520,
        durationMs: 1600,
        from: {
          speed: 0.025,
          scale: 5,
          frequency: 0.72,
          warpStrength: 0.42,
          mouseInfluence: 0.01,
          parallax: 0.02,
          noise: 0.0,
          autoRotate: 0.0,
        },
      };
      const FIXED_RENDER_WIDTH = 1920;
      const FIXED_RENDER_HEIGHT = 1080;
      const introState = {
        startedAtMs: null,
      };

      const MAX_COLORS = 8;
      const frag = `
        #define MAX_COLORS ${MAX_COLORS}
        uniform vec2 uCanvas;
        uniform float uTime;
        uniform float uSpeed;
        uniform vec2 uRot;
        uniform int uColorCount;
        uniform vec3 uColors[MAX_COLORS];
        uniform int uTransparent;
        uniform float uScale;
        uniform float uFrequency;
        uniform float uWarpStrength;
        uniform vec2 uPointer;
        uniform float uMouseInfluence;
        uniform float uParallax;
        uniform float uNoise;
        varying vec2 vUv;

        void main() {
          float t = uTime * uSpeed;
          vec2 p = vUv * 2.0 - 1.0;
          p += uPointer * uParallax * 0.1;
          vec2 rp = vec2(p.x * uRot.x - p.y * uRot.y, p.x * uRot.y + p.y * uRot.x);
          float aspect = uCanvas.x / max(uCanvas.y, 0.0001);
          vec2 q = vec2(rp.x * aspect, rp.y);
          q /= max(uScale, 0.0001);
          q /= 0.5 + 0.2 * dot(q, q);
          q += 0.2 * cos(t) - 7.56;
          vec2 toward = (uPointer - rp);
          q += toward * uMouseInfluence * 0.2;

          vec3 col = vec3(0.0);
          float a = 1.0;

          if (uColorCount > 0) {
            vec2 s = q;
            vec3 sumCol = vec3(0.0);
            float cover = 0.0;
            for (int i = 0; i < MAX_COLORS; ++i) {
              if (i >= uColorCount) break;
              s -= 0.01;
              vec2 r = sin(1.5 * (s.yx * uFrequency) + 2.0 * cos(s * uFrequency));
              float m0 = length(r + sin(5.0 * r.y * uFrequency - 3.0 * t + float(i)) / 4.0);
              float kBelow = clamp(uWarpStrength, 0.0, 1.0);
              float kMix = pow(kBelow, 0.3);
              float gain = 1.0 + max(uWarpStrength - 1.0, 0.0);
              vec2 disp = (r - s) * kBelow;
              vec2 warped = s + disp * gain;
              float m1 = length(warped + sin(5.0 * warped.y * uFrequency - 3.0 * t + float(i)) / 4.0);
              float m = mix(m0, m1, kMix);
              float w = 1.0 - exp(-6.0 / exp(6.0 * m));
              sumCol += uColors[i] * w;
              cover = max(cover, w);
            }
            col = clamp(sumCol, 0.0, 1.0);
            a = uTransparent > 0 ? cover : 1.0;
          } else {
            vec2 s = q;
            for (int k = 0; k < 3; ++k) {
              s -= 0.01;
              vec2 r = sin(1.5 * (s.yx * uFrequency) + 2.0 * cos(s * uFrequency));
              float m0 = length(r + sin(5.0 * r.y * uFrequency - 3.0 * t + float(k)) / 4.0);
              float kBelow = clamp(uWarpStrength, 0.0, 1.0);
              float kMix = pow(kBelow, 0.3);
              float gain = 1.0 + max(uWarpStrength - 1.0, 0.0);
              vec2 disp = (r - s) * kBelow;
              vec2 warped = s + disp * gain;
              float m1 = length(warped + sin(5.0 * warped.y * uFrequency - 3.0 * t + float(k)) / 4.0);
              float m = mix(m0, m1, kMix);
              col[k] = 1.0 - exp(-6.0 / exp(6.0 * m));
            }
            a = uTransparent > 0 ? max(max(col.r, col.g), col.b) : 1.0;
          }

          if (uNoise > 0.0001) {
            float n = fract(sin(dot(gl_FragCoord.xy + vec2(uTime), vec2(12.9898, 78.233))) * 43758.5453123);
            col += (n - 0.5) * uNoise;
            col = clamp(col, 0.0, 1.0);
          }

          vec3 rgb = (uTransparent > 0) ? col * a : col;
          gl_FragColor = vec4(rgb, a);
        }
      `;

      const vert = `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = vec4(position, 1.0);
        }
      `;

      const scene = new THREE.Scene();
      const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
      const geometry = new THREE.PlaneGeometry(2, 2);
      const colors = colorBendsConfig.color
        ? [colorBendsConfig.color]
        : colorBendsConfig.colors;
      const uniformColors = Array.from({ length: MAX_COLORS }, () => new THREE.Vector3(0, 0, 0));

      const material = new THREE.ShaderMaterial({
        vertexShader: vert,
        fragmentShader: frag,
        uniforms: {
          uCanvas: { value: new THREE.Vector2(1, 1) },
          uTime: { value: 0 },
          uSpeed: { value: colorBendsConfig.speed },
          uRot: { value: new THREE.Vector2(1, 0) },
          uColorCount: { value: 0 },
          uColors: { value: uniformColors },
          uTransparent: { value: colorBendsConfig.transparent ? 1 : 0 },
          uScale: { value: colorBendsConfig.scale },
          uFrequency: { value: colorBendsConfig.frequency },
          uWarpStrength: { value: colorBendsConfig.warpStrength },
          uPointer: { value: new THREE.Vector2(0, 0) },
          uMouseInfluence: { value: colorBendsConfig.mouseInfluence },
          uParallax: { value: colorBendsConfig.parallax },
          uNoise: { value: colorBendsConfig.noise },
        },
        premultipliedAlpha: true,
        transparent: true,
      });

      function hexToVec3(hex) {
        const safe = String(hex || '').replace('#', '').trim();
        const normalized = safe.length === 3
          ? `${safe[0]}${safe[0]}${safe[1]}${safe[1]}${safe[2]}${safe[2]}`
          : safe;
        const r = parseInt(normalized.slice(0, 2), 16) / 255;
        const g = parseInt(normalized.slice(2, 4), 16) / 255;
        const b = parseInt(normalized.slice(4, 6), 16) / 255;
        return new THREE.Vector3(r, g, b);
      }

      const mappedColors = colors.map(hexToVec3).slice(0, MAX_COLORS);
      for (let index = 0; index < MAX_COLORS; index += 1) {
        if (index < mappedColors.length) {
          material.uniforms.uColors.value[index].copy(mappedColors[index]);
        } else {
          material.uniforms.uColors.value[index].set(0, 0, 0);
        }
      }
      material.uniforms.uColorCount.value = mappedColors.length;

      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({
          antialias: false,
          powerPreference: 'high-performance',
          alpha: true,
        });
      } catch (error) {
        return;
      }

      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setPixelRatio(Math.max(1, window.devicePixelRatio || 1));
      renderer.setClearColor(0x000000, 0);
      container.appendChild(renderer.domElement);

      const pointerTarget = new THREE.Vector2(0, 0);
      const pointerCurrent = new THREE.Vector2(0, 0);

      renderer.setSize(FIXED_RENDER_WIDTH, FIXED_RENDER_HEIGHT, false);
      material.uniforms.uCanvas.value.set(FIXED_RENDER_WIDTH, FIXED_RENDER_HEIGHT);

      const mix = (from, to, progress) => from + (to - from) * progress;
      const clamp01 = (value) => Math.min(1, Math.max(0, value));
      const easeOutCubic = (value) => 1 - Math.pow(1 - clamp01(value), 3);

      function getPointerViewportSize() {
        const visualViewport = window.visualViewport;
        const width = Math.max(1, Math.round(visualViewport?.width || window.innerWidth || document.documentElement.clientWidth || 1));
        const height = Math.max(1, Math.round(visualViewport?.height || window.innerHeight || document.documentElement.clientHeight || 1));
        return { width, height };
      }

      const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
      let prefersReducedMotion = motionQuery.matches;
      let speedTarget = colorBendsConfig.speed;
      let mouseInfluenceTarget = colorBendsConfig.mouseInfluence;
      let autoRotateTarget = colorBendsConfig.autoRotate;
      function applyMotionPreference() {
        prefersReducedMotion = motionQuery.matches;
        speedTarget = prefersReducedMotion ? colorBendsConfig.speed * 0.45 : colorBendsConfig.speed;
        mouseInfluenceTarget = prefersReducedMotion
          ? Math.max(0.2, colorBendsConfig.mouseInfluence * 0.6)
          : colorBendsConfig.mouseInfluence;
        autoRotateTarget = prefersReducedMotion ? colorBendsConfig.autoRotate * 0.5 : colorBendsConfig.autoRotate;
      }
      applyMotionPreference();
      if (typeof motionQuery.addEventListener === 'function') {
        motionQuery.addEventListener('change', applyMotionPreference);
      }

      window.startColorBendsIntro = () => {
        introState.startedAtMs = performance.now();
      };

      const handlePointerMove = event => {
        const { width, height } = getPointerViewportSize();
        const x = (event.clientX / width) * 2 - 1;
        const y = -((event.clientY / height) * 2 - 1);
        pointerTarget.set(x, y);
      };

      const handlePointerLeave = () => {
        pointerTarget.set(0, 0);
      };

      window.addEventListener('pointermove', handlePointerMove, { passive: true });
      window.addEventListener('pointerleave', handlePointerLeave, { passive: true });
      window.addEventListener('blur', handlePointerLeave, { passive: true });

      const clock = new THREE.Clock();
      function renderFrame() {
        const dt = clock.getDelta();
        const elapsed = clock.elapsedTime;
        material.uniforms.uTime.value = elapsed;

        const hasIntroStarted = Number.isFinite(introState.startedAtMs);
        const introElapsedMs = hasIntroStarted ? (performance.now() - introState.startedAtMs) : 0;
        const introRawProgress = clamp01((introElapsedMs - introParamConfig.delayMs) / introParamConfig.durationMs);
        const introProgress = easeOutCubic(introRawProgress);

        material.uniforms.uSpeed.value = mix(introParamConfig.from.speed, speedTarget, introProgress);
        material.uniforms.uScale.value = mix(introParamConfig.from.scale, colorBendsConfig.scale, introProgress);
        material.uniforms.uFrequency.value = mix(introParamConfig.from.frequency, colorBendsConfig.frequency, introProgress);
        material.uniforms.uWarpStrength.value = mix(introParamConfig.from.warpStrength, colorBendsConfig.warpStrength, introProgress);
        material.uniforms.uMouseInfluence.value = mix(introParamConfig.from.mouseInfluence, mouseInfluenceTarget, introProgress);
        material.uniforms.uParallax.value = mix(introParamConfig.from.parallax, colorBendsConfig.parallax, introProgress);
        material.uniforms.uNoise.value = mix(introParamConfig.from.noise, colorBendsConfig.noise, introProgress);

        const currentAutoRotate = mix(introParamConfig.from.autoRotate, autoRotateTarget, introProgress);
        const rotationDeg = (colorBendsConfig.rotation % 360) + currentAutoRotate * elapsed;
        const rotationRad = (rotationDeg * Math.PI) / 180;
        material.uniforms.uRot.value.set(Math.cos(rotationRad), Math.sin(rotationRad));

        pointerCurrent.lerp(pointerTarget, Math.min(1, dt * 10));
        material.uniforms.uPointer.value.copy(pointerCurrent);

        renderer.render(scene, camera);
        requestAnimationFrame(renderFrame);
      }
      requestAnimationFrame(renderFrame);
    })();
  </script>

  <script>
    const AUTH_STORAGE_KEY = 'vault-auth-user';
    const AUTH_COOKIE_KEY = 'vault-auth-user-cookie';
    const REGISTERED_MEMBERS_API = '/api/registered-members';
    const FAST_TRACK_PACKAGE_META = {
      'preferred-customer-pack': { label: 'Free Account', price: 0, bv: 0 },
      'personal-builder-pack': { label: 'Personal Builder Pack', price: 192, bv: 192 },
      'business-builder-pack': { label: 'Business Builder Pack', price: 384, bv: 300 },
      'infinity-builder-pack': { label: 'Infinity Builder Pack', price: 640, bv: 500 },
      'legacy-builder-pack': { label: 'Legacy Builder Pack', price: 1280, bv: 1000 },
    };
    const FREE_ACCOUNT_PACKAGE_KEY = 'preferred-customer-pack';
    const FREE_ACCOUNT_RANK_KEY_SET = new Set(['preferred customer', 'free account', 'free']);
    const LEGACY_STORE_CODE_ALIASES = Object.freeze({
      'CHG-7X42': 'CHG-ZERO',
    });

    const loginForm = document.getElementById('login-form');
    const loginIdentifierInput = document.getElementById('login-identifier');
    const loginPasswordInput = document.getElementById('login-password');
    const loginSubmitButton = document.getElementById('login-submit');
    const loginSubmitSpinner = document.getElementById('login-submit-spinner');
    const loginSubmitLabel = document.getElementById('login-submit-label');
    const loginError = document.getElementById('login-error');
    const loginInspirationHeading = document.getElementById('login-inspiration-heading');

    const INSPIRATION_ROTATE_MS = 4200;
    const INSPIRATION_ENTRIES = [
      { text: 'Build with Purpose.', fontClass: 'font-body' },
      { text: 'Lead with Vision.', fontClass: 'font-alt' },
      { text: 'Grow Beyond Limits.', fontClass: 'font-display' },
      { text: 'Make Today Count.', fontClass: 'font-body' },
      { text: 'Next Level Starts Now.', fontClass: 'font-alt' },
    ];
    const INSPIRATION_FONT_CLASSES = ['font-display', 'font-body', 'font-alt'];

    function applyInspirationEntry(entry) {
      if (!loginInspirationHeading || !entry) {
        return;
      }
      loginInspirationHeading.classList.remove(...INSPIRATION_FONT_CLASSES);
      loginInspirationHeading.classList.add(entry.fontClass || 'font-display');
      loginInspirationHeading.textContent = entry.text || '';
    }

    function startInspirationRotation() {
      if (!loginInspirationHeading || !INSPIRATION_ENTRIES.length) {
        return;
      }
      let currentIndex = 0;
      applyInspirationEntry(INSPIRATION_ENTRIES[currentIndex]);

      window.setInterval(() => {
        if (!loginInspirationHeading.isConnected) {
          return;
        }

        currentIndex = (currentIndex + 1) % INSPIRATION_ENTRIES.length;
        loginInspirationHeading.classList.add('opacity-0');
        window.setTimeout(() => {
          applyInspirationEntry(INSPIRATION_ENTRIES[currentIndex]);
          loginInspirationHeading.classList.remove('opacity-0');
        }, 260);
      }, INSPIRATION_ROTATE_MS);
    }

    function normalizeCredential(value) {
      return String(value || '').trim().toLowerCase();
    }

    function normalizeMemberKey(value) {
      return normalizeCredential(value);
    }

    function normalizeStoreCode(value) {
      const normalizedValue = String(value || '')
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9-]/g, '');
      return LEGACY_STORE_CODE_ALIASES[normalizedValue] || normalizedValue;
    }

    function isFreeAccountUser(user) {
      if (!user || typeof user !== 'object') {
        return false;
      }

      const packageKey = normalizeMemberKey(user?.enrollmentPackage);
      if (packageKey === FREE_ACCOUNT_PACKAGE_KEY) {
        return true;
      }

      const rankKey = normalizeMemberKey(user?.accountRank || user?.rank);
      return FREE_ACCOUNT_RANK_KEY_SET.has(rankKey);
    }

    function toWholeNumber(value, fallback = 0) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return fallback;
      }
      return Math.max(0, Math.floor(numeric));
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeStorageGet(storage, key) {
      try {
        if (!storage) {
          return null;
        }
        return storage.getItem(key);
      } catch {
        return null;
      }
    }

    function safeStorageSet(storage, key, value) {
      try {
        if (!storage) {
          return false;
        }
        storage.setItem(key, value);
        return true;
      } catch {
        return false;
      }
    }

    function readCookieValue(key) {
      const source = document.cookie || '';
      const encodedKey = `${encodeURIComponent(key)}=`;
      const pairs = source.split(';');

      for (const pair of pairs) {
        const trimmedPair = pair.trim();
        if (!trimmedPair.startsWith(encodedKey)) {
          continue;
        }

        return decodeURIComponent(trimmedPair.slice(encodedKey.length));
      }

      return null;
    }

    function writeCookieValue(key, value) {
      try {
        document.cookie = `${encodeURIComponent(key)}=${encodeURIComponent(value)}; path=/; SameSite=Lax`;
        return true;
      } catch {
        return false;
      }
    }

    function parseSessionPayload(raw) {
      if (!raw) {
        return null;
      }

      try {
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') {
          return null;
        }

        return parsed;
      } catch {
        return null;
      }
    }

    function readUserSession() {
      const localSession = parseSessionPayload(safeStorageGet(window.localStorage, AUTH_STORAGE_KEY));
      if (localSession) {
        return localSession;
      }

      const tabSession = parseSessionPayload(safeStorageGet(window.sessionStorage, AUTH_STORAGE_KEY));
      if (tabSession) {
        return tabSession;
      }

      return parseSessionPayload(readCookieValue(AUTH_COOKIE_KEY));
    }

    function persistUserSession(user) {
      const enrollmentPackageBvRaw = Number(user?.enrollmentPackageBv);
      const enrollmentPackageBv = Number.isFinite(enrollmentPackageBvRaw) ? Math.max(0, Math.floor(enrollmentPackageBvRaw)) : 0;
      const starterPersonalPvRaw = Number(user?.starterPersonalPv);
      const starterPersonalPv = Number.isFinite(starterPersonalPvRaw) ? Math.max(0, Math.floor(starterPersonalPvRaw)) : enrollmentPackageBv;
      const starterTotalCyclesRaw = Number(user?.starterTotalCycles);
      const starterTotalCycles = Number.isFinite(starterTotalCyclesRaw) ? Math.max(0, Math.floor(starterTotalCyclesRaw)) : 0;

      const sessionUser = {
        id: user?.id || null,
        name: user?.name || user?.username || 'User',
        username: user?.username || '',
        email: user?.email || '',
        countryFlag: typeof user?.countryFlag === 'string' ? user.countryFlag : '',
        accountStatus: typeof user?.accountStatus === 'string' ? user.accountStatus : '',
        attributionStoreCode: typeof user?.attributionStoreCode === 'string' ? user.attributionStoreCode : '',
        publicStoreCode: typeof user?.publicStoreCode === 'string' ? user.publicStoreCode : '',
        storeCode: typeof user?.storeCode === 'string' ? user.storeCode : '',
        enrollmentPackage: user?.enrollmentPackage || '',
        enrollmentPackageLabel: user?.enrollmentPackageLabel || '',
        enrollmentPackagePrice: Number.isFinite(Number(user?.enrollmentPackagePrice))
          ? Number(user.enrollmentPackagePrice)
          : 0,
        enrollmentPackageBv,
        starterPersonalPv,
        starterTotalCycles,
        createdAt: typeof user?.createdAt === 'string' ? user.createdAt : '',
        rank: typeof user?.rank === 'string' ? user.rank : '',
        accountRank: typeof user?.accountRank === 'string'
          ? user.accountRank
          : (typeof user?.rank === 'string' ? user.rank : ''),
        activityActiveUntilAt: typeof user?.activityActiveUntilAt === 'string' ? user.activityActiveUntilAt : '',
        lastProductPurchaseAt: typeof user?.lastProductPurchaseAt === 'string' ? user.lastProductPurchaseAt : '',
        lastPurchaseAt: typeof user?.lastPurchaseAt === 'string' ? user.lastPurchaseAt : '',
        authToken: typeof user?.authToken === 'string' ? user.authToken : '',
        authTokenExpiresAt: typeof user?.authTokenExpiresAt === 'string' ? user.authTokenExpiresAt : '',
      };

      const serializedSession = JSON.stringify(sessionUser);
      const wroteLocal = safeStorageSet(window.localStorage, AUTH_STORAGE_KEY, serializedSession);
      const wroteSession = safeStorageSet(window.sessionStorage, AUTH_STORAGE_KEY, serializedSession);
      const wroteCookie = writeCookieValue(AUTH_COOKIE_KEY, serializedSession);

      if (!wroteLocal && !wroteSession && !wroteCookie) {
        throw new Error('AUTH_STORAGE_UNAVAILABLE');
      }

      return sessionUser;
    }

    function revealLoginError() {
      loginError.classList.remove('opacity-0', 'pointer-events-none', 'border-transparent', 'bg-transparent');
      loginError.classList.add('opacity-100', 'border-semantic-danger/40', 'bg-semantic-danger-bg');
    }

    function hideLoginError() {
      loginError.textContent = '';
      loginError.classList.remove('opacity-100', 'border-semantic-danger/40', 'bg-semantic-danger-bg');
      loginError.classList.add('opacity-0', 'pointer-events-none', 'border-transparent', 'bg-transparent');
    }

    function showLoginError(message) {
      loginError.textContent = message;
      revealLoginError();
    }

    function showPasswordSetupRequiredError(message, setupLink) {
      const normalizedMessage = String(message || '').trim() || 'Password setup required.';
      const normalizedSetupLink = String(setupLink || '').trim();
      if (!/^\/(?:password-setup|store-password-setup)\.html\?token=/.test(normalizedSetupLink)) {
        showLoginError(normalizedMessage);
        return;
      }

      loginError.innerHTML = `${escapeHtml(normalizedMessage)} <a href="${escapeHtml(normalizedSetupLink)}" class="underline text-brand-400 hover:text-brand-300">Open setup link</a>`;
      revealLoginError();
    }

    function setLoginBusy(isBusy) {
      loginIdentifierInput.disabled = isBusy;
      loginPasswordInput.disabled = isBusy;
      loginSubmitButton.disabled = isBusy;
      loginSubmitButton.setAttribute('aria-busy', isBusy ? 'true' : 'false');
      loginSubmitButton.classList.toggle('cursor-wait', isBusy);
      if (loginSubmitSpinner) {
        loginSubmitSpinner.classList.toggle('hidden', !isBusy);
      }
      if (loginSubmitLabel) {
        loginSubmitLabel.textContent = isBusy ? 'Logging In...' : 'Login';
      }
    }

    function resolvePostLoginDestination(user) {
      if (!isFreeAccountUser(user)) {
        return './index.html';
      }

      const destinationUrl = new URL('/store-dashboard.html', window.location.origin);
      const loginQueryParams = new URLSearchParams(window.location.search);
      const candidateStoreCode = normalizeStoreCode(
        user?.attributionStoreCode || user?.publicStoreCode || user?.storeCode || loginQueryParams.get('store'),
      );
      if (candidateStoreCode) {
        destinationUrl.searchParams.set('store', candidateStoreCode);
      }

      return `${destinationUrl.pathname}${destinationUrl.search}`;
    }

    async function authenticateUser(identifier, password) {
      const response = await fetch('/api/member-auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          identifier,
          password,
        }),
      });

      const payload = await response.json().catch(() => ({}));
      if (response.ok && payload?.user) {
        return payload.user;
      }

      const loginError = new Error(
        typeof payload?.error === 'string'
          ? payload.error
          : `Sign-in failed (${response.status}).`,
      );
      loginError.code = typeof payload?.code === 'string' ? payload.code : '';
      loginError.status = response.status;
      loginError.setupLink = typeof payload?.setupLink === 'string' ? payload.setupLink : '';
      throw loginError;
    }

    function resolveEnrollmentPackageMeta(packageKey) {
      const normalizedKey = normalizeCredential(packageKey);
      return FAST_TRACK_PACKAGE_META[normalizedKey] || null;
    }

    function hasStarterDashboardProfile(user) {
      const packageBv = toWholeNumber(user?.enrollmentPackageBv, 0);
      const starterPv = toWholeNumber(user?.starterPersonalPv, 0);
      return packageBv > 0 || starterPv > 0;
    }

    function resolveRegisteredMemberMatch(user, members) {
      if (!Array.isArray(members) || !user) {
        return null;
      }

      const normalizedEmail = normalizeCredential(user?.email);
      const normalizedUsername = normalizeCredential(user?.username);

      return members.find((member) => {
        const memberEmail = normalizeCredential(member?.email);
        const memberUsername = normalizeCredential(member?.memberUsername);
        const emailMatch = normalizedEmail && memberEmail === normalizedEmail;
        const usernameMatch = normalizedUsername && memberUsername === normalizedUsername;
        return emailMatch || usernameMatch;
      }) || null;
    }

    async function loadRegisteredMembersForHydration() {
      const endpoints = [REGISTERED_MEMBERS_API, './registered-members.json'];

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, { cache: 'no-store' });
          if (!response.ok) {
            continue;
          }

          const payload = await response.json().catch(() => null);
          if (Array.isArray(payload)) {
            return payload;
          }
          if (Array.isArray(payload?.members)) {
            return payload.members;
          }
        } catch {
          // Continue to fallback endpoint.
        }
      }

      return [];
    }

    function mergeStarterDashboardProfile(user, registeredMember) {
      const packageKey = normalizeCredential(user?.enrollmentPackage || registeredMember?.enrollmentPackage);
      const packageMeta = resolveEnrollmentPackageMeta(packageKey);
      const fallbackPackagePrice = packageMeta ? Number(packageMeta.price) : 0;
      const packagePriceFromUser = Number(user?.enrollmentPackagePrice);
      const packagePriceFromMember = Number(registeredMember?.packagePrice);
      const packagePrice = Number.isFinite(packagePriceFromUser)
        ? packagePriceFromUser
        : (Number.isFinite(packagePriceFromMember) ? packagePriceFromMember : fallbackPackagePrice);
      const packageBvFromUser = toWholeNumber(user?.enrollmentPackageBv, 0);
      const packageBvFromMember = toWholeNumber(registeredMember?.packageBv, 0);
      const packageBvFromMeta = toWholeNumber(packageMeta?.bv, toWholeNumber(packagePrice, 0));
      const packageBv = packageBvFromUser > 0
        ? packageBvFromUser
        : (packageBvFromMember > 0 ? packageBvFromMember : packageBvFromMeta);

      if (packageBv <= 0 && !packageKey) {
        return user;
      }

      const starterPersonalPv = toWholeNumber(user?.starterPersonalPv, packageBv);
      const starterTotalCycles = toWholeNumber(user?.starterTotalCycles, 0);

      return {
        ...user,
        countryFlag: user?.countryFlag || registeredMember?.countryFlag || '',
        enrollmentPackage: packageKey || user?.enrollmentPackage || '',
        enrollmentPackageLabel: user?.enrollmentPackageLabel || registeredMember?.enrollmentPackageLabel || packageMeta?.label || '',
        enrollmentPackagePrice: packagePrice,
        enrollmentPackageBv: packageBv,
        starterPersonalPv: starterPersonalPv > 0 ? starterPersonalPv : packageBv,
        starterTotalCycles,
      };
    }

    async function hydrateStarterDashboardProfile(user) {
      if (!user || hasStarterDashboardProfile(user)) {
        return user;
      }

      const members = await loadRegisteredMembersForHydration();
      const matchedMember = resolveRegisteredMemberMatch(user, members);
      if (!matchedMember) {
        return user;
      }

      return mergeStarterDashboardProfile(user, matchedMember);
    }

    function runLoginIntroAnimation() {
      const pageShell = document.querySelector('.page-shell');
      const revealItems = Array.from(document.querySelectorAll('.reveal-up'));
      const colorBendsBackground = document.getElementById('color-bends-bg');
      if (!pageShell || !revealItems.length) {
        return;
      }

      if (typeof window.startColorBendsIntro === 'function') {
        window.startColorBendsIntro();
      }

      const targets = [pageShell, ...revealItems];
      for (const target of targets) {
        if (typeof target.getAnimations === 'function') {
          for (const animation of target.getAnimations()) {
            animation.cancel();
          }
        }
        target.style.opacity = '';
        target.style.transform = '';
        target.style.filter = '';
      }

      if (colorBendsBackground) {
        if (typeof colorBendsBackground.getAnimations === 'function') {
          for (const animation of colorBendsBackground.getAnimations()) {
            animation.cancel();
          }
        }
        colorBendsBackground.style.opacity = '0';
      }

      pageShell.animate(
        [
          { opacity: 0, filter: 'blur(22px) saturate(0.88)' },
          { opacity: 1, filter: 'blur(0px) saturate(1)' },
        ],
        {
          duration: 880,
          easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
          fill: 'both',
        },
      );

      if (colorBendsBackground) {
        colorBendsBackground.animate(
          [
            { opacity: 0 },
            { opacity: 1 },
          ],
          {
            duration: 980,
            delay: 520,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            fill: 'both',
          },
        );
      }

      for (const item of revealItems) {
        const delay = Number.parseInt(item.style.getPropertyValue('--reveal-delay'), 10) || 0;
        item.animate(
          [
            { opacity: 0, transform: 'translate3d(0, 34px, 0)', filter: 'blur(16px)' },
            { opacity: 1, transform: 'translate3d(0, 0, 0)', filter: 'blur(0px)' },
          ],
          {
            duration: 940,
            delay,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            fill: 'both',
          },
        );
      }
    }

    window.requestAnimationFrame(() => {
      window.setTimeout(runLoginIntroAnimation, 60);
    });
    window.addEventListener('pageshow', () => {
      window.requestAnimationFrame(() => {
        window.setTimeout(runLoginIntroAnimation, 60);
      });
    });

    startInspirationRotation();

    const existingSession = readUserSession();
    if (existingSession) {
      const accountLabel = String(
        existingSession?.name
        || existingSession?.username
        || existingSession?.email
        || 'current account',
      ).trim();
      showLoginError(`Currently signed in as ${accountLabel}. Sign in below to switch accounts.`);
    }
    loginIdentifierInput.focus();

    [loginIdentifierInput, loginPasswordInput].forEach((input) => {
      input.addEventListener('input', hideLoginError);
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideLoginError();

      const identifier = loginIdentifierInput.value;
      const password = loginPasswordInput.value;

      if (!identifier.trim() || !password) {
        showLoginError('Enter your Username or Email and Password.');
        return;
      }

      setLoginBusy(true);

      try {
        const matchedUser = await authenticateUser(identifier, password);
        if (!matchedUser) {
          showLoginError('Invalid credentials. Please try again.');
          return;
        }

        const hydratedUser = await hydrateStarterDashboardProfile(matchedUser);
        const persistedUser = persistUserSession(hydratedUser);
        const destination = resolvePostLoginDestination(persistedUser);
        loginForm.reset();
        window.location.replace(destination);
      } catch (error) {
        if (error instanceof Error && error.message === 'AUTH_STORAGE_UNAVAILABLE') {
          showLoginError('Sign-in blocked by browser storage settings. Disable private mode and retry.');
        } else if (error instanceof Error && error.code === 'PASSWORD_SETUP_REQUIRED') {
          showPasswordSetupRequiredError(
            error.message,
            typeof error.setupLink === 'string' ? error.setupLink : '',
          );
        } else {
          showLoginError(error instanceof Error ? error.message : 'Unable to sign in.');
        }
      } finally {
        setLoginBusy(false);
      }
    });
  </script>
</body>
</html>
