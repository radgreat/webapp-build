<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Login</title>
  <script>
    const UNATTRIBUTED_STORE_CODE_SET = new Set([
      'REGISTRATIONLOCKED',
      'REGISTRATION-LOCKED',
    ]);

    function normalizeStoreCode(value) {
      const normalizedStoreCode = String(value || '')
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9-]/g, '');
      return UNATTRIBUTED_STORE_CODE_SET.has(normalizedStoreCode) ? '' : normalizedStoreCode;
    }

    (function redirectToUnifiedLogin() {
      const currentUrl = new URL(window.location.href);
      const targetUrl = new URL('/login.html', window.location.origin);
      const storeCode = normalizeStoreCode(currentUrl.searchParams.get('store'));
      if (storeCode) {
        targetUrl.searchParams.set('store', storeCode);
      }

      window.location.replace(`${targetUrl.pathname}${targetUrl.search}`);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a id="unified-login-link" href="/login.html">/login.html</a>...</p>
  <script>
    (function syncFallbackLink() {
      const linkElement = document.getElementById('unified-login-link');
      if (!linkElement) {
        return;
      }
      const currentUrl = new URL(window.location.href);
      const targetUrl = new URL('/login.html', window.location.origin);
      const storeCode = normalizeStoreCode(currentUrl.searchParams.get('store'));
      if (storeCode) {
        targetUrl.searchParams.set('store', storeCode);
      }
      linkElement.href = `${targetUrl.pathname}${targetUrl.search}`;
    })();
  </script>
</body>
</html>
