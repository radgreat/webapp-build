<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premiere Life Store - Free Member Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between gap-4">
        <a id="brand-home-link" href="/store.html" class="inline-flex items-center"><img src="/brand_assets/Logos/L%26D%20Logo_Cropped.png" alt="L&D logo" class="h-10 w-auto"></a>

        <div class="flex items-center gap-2">
          <a href="/login.html" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 transition hover:border-emerald-300 hover:text-emerald-700 sm:text-sm">Member Login</a>
          <a id="header-store-link" href="/store.html" class="rounded-lg bg-emerald-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-emerald-500 sm:text-sm">Back to Store</a>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto flex min-h-[calc(100dvh-90px)] w-full max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
    <section class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-7">
      <div>
        <p class="text-xs font-semibold uppercase tracking-wide text-emerald-600">Free Members</p>
        <h1 class="mt-1 text-2xl font-bold text-slate-900">Sign in to your Free Account</h1>
        <p class="mt-2 text-sm text-slate-600">
          Use your account credentials. If your account is new and pending setup, the setup link will be shown here.
        </p>
      </div>

      <form id="preferred-login-form" class="mt-5 space-y-3" novalidate>
        <div>
          <label for="preferred-login-identifier" class="text-xs font-semibold uppercase tracking-wide text-slate-500">Username or Email</label>
          <input id="preferred-login-identifier" name="identifier" type="text" autocomplete="username" required placeholder="Enter username or email" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200">
        </div>
        <div>
          <label for="preferred-login-password" class="text-xs font-semibold uppercase tracking-wide text-slate-500">Password</label>
          <input id="preferred-login-password" name="password" type="password" autocomplete="current-password" required placeholder="Enter password" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200">
        </div>
        <p id="preferred-login-error" class="hidden rounded-lg border border-rose-300 bg-rose-50 px-3 py-2 text-sm text-rose-700" role="alert"></p>
        <button id="preferred-login-submit" type="submit" class="w-full rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-emerald-500 disabled:cursor-not-allowed disabled:opacity-50">Sign In</button>
      </form>

      <section id="preferred-setup-panel" class="mt-4 hidden rounded-xl border border-emerald-200 bg-emerald-50 p-3">
        <p class="text-sm font-semibold text-emerald-800">Password Setup Link</p>
        <p class="mt-1 text-xs text-emerald-700">Development mode convenience link:</p>
        <a id="preferred-setup-link" href="#" target="_blank" rel="noopener noreferrer" class="mt-1 block break-all text-sm text-emerald-700 underline hover:text-emerald-600"></a>
      </section>

      <div class="mt-5 rounded-lg border border-slate-200 bg-slate-50 p-3">
        <p class="text-xs text-slate-600">Auth source: <span class="font-medium text-slate-700">/api/member-auth/login</span></p>
      </div>
    </section>
  </main>

  <script>
    const AUTH_STORAGE_KEY = 'vault-auth-user';
    const AUTH_COOKIE_KEY = 'vault-auth-user-cookie';
    const FREE_ACCOUNT_PACKAGE_KEY = 'preferred-customer-pack';
    const FREE_ACCOUNT_RANK_KEY_SET = new Set(['preferred customer', 'free account', 'free']);
    const STORE_CODE_ALIASES = Object.freeze({
      'CHG-7X42': 'CHG-ZERO',
    });

    const formElement = document.getElementById('preferred-login-form');
    const identifierInputElement = document.getElementById('preferred-login-identifier');
    const passwordInputElement = document.getElementById('preferred-login-password');
    const submitButtonElement = document.getElementById('preferred-login-submit');
    const errorElement = document.getElementById('preferred-login-error');
    const setupPanelElement = document.getElementById('preferred-setup-panel');
    const setupLinkElement = document.getElementById('preferred-setup-link');
    const brandHomeLinkElement = document.getElementById('brand-home-link');
    const headerStoreLinkElement = document.getElementById('header-store-link');

    function normalizeText(value) {
      return String(value || '').trim();
    }

    function normalizeStoreCode(value) {
      const normalizedValue = normalizeText(value).toUpperCase().replace(/[^A-Z0-9-]/g, '');
      return STORE_CODE_ALIASES[normalizedValue] || normalizedValue;
    }

    function normalizeCredential(value) {
      return normalizeText(value).toLowerCase();
    }

    function normalizeMemberKey(value) {
      return normalizeCredential(value);
    }

    function isFreeAccountUser(user) {
      if (!user || typeof user !== 'object') {
        return false;
      }

      const packageKey = normalizeMemberKey(user?.enrollmentPackage);
      if (packageKey === FREE_ACCOUNT_PACKAGE_KEY) {
        return true;
      }

      const rankKey = normalizeMemberKey(user?.accountRank || user?.rank);
      return FREE_ACCOUNT_RANK_KEY_SET.has(rankKey);
    }

    function safeStorageGet(storage, key) {
      try {
        if (!storage) {
          return null;
        }
        return storage.getItem(key);
      } catch {
        return null;
      }
    }

    function safeStorageSet(storage, key, value) {
      try {
        if (!storage) {
          return false;
        }
        storage.setItem(key, value);
        return true;
      } catch {
        return false;
      }
    }

    function readCookieValue(key) {
      const source = document.cookie || '';
      const encodedKey = `${encodeURIComponent(key)}=`;
      const pairs = source.split(';');
      for (const pair of pairs) {
        const trimmedPair = pair.trim();
        if (!trimmedPair.startsWith(encodedKey)) {
          continue;
        }
        return decodeURIComponent(trimmedPair.slice(encodedKey.length));
      }
      return null;
    }

    function writeCookieValue(key, value) {
      try {
        document.cookie = `${encodeURIComponent(key)}=${encodeURIComponent(value)}; path=/; SameSite=Lax`;
        return true;
      } catch {
        return false;
      }
    }

    function parseSessionPayload(raw) {
      if (!raw) {
        return null;
      }
      try {
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : null;
      } catch {
        return null;
      }
    }

    function readUserSession() {
      const localSession = parseSessionPayload(safeStorageGet(window.localStorage, AUTH_STORAGE_KEY));
      if (localSession) {
        return localSession;
      }
      const tabSession = parseSessionPayload(safeStorageGet(window.sessionStorage, AUTH_STORAGE_KEY));
      if (tabSession) {
        return tabSession;
      }
      return parseSessionPayload(readCookieValue(AUTH_COOKIE_KEY));
    }

    function persistUserSession(user) {
      const sessionUser = {
        id: user?.id || null,
        name: user?.name || user?.username || 'User',
        username: user?.username || '',
        email: user?.email || '',
        countryFlag: typeof user?.countryFlag === 'string' ? user.countryFlag : '',
        accountStatus: typeof user?.accountStatus === 'string' ? user.accountStatus : '',
        attributionStoreCode: typeof user?.attributionStoreCode === 'string' ? user.attributionStoreCode : '',
        publicStoreCode: typeof user?.publicStoreCode === 'string' ? user.publicStoreCode : '',
        storeCode: typeof user?.storeCode === 'string' ? user.storeCode : '',
        enrollmentPackage: user?.enrollmentPackage || '',
        enrollmentPackageLabel: user?.enrollmentPackageLabel || '',
        enrollmentPackagePrice: Number.isFinite(Number(user?.enrollmentPackagePrice)) ? Number(user.enrollmentPackagePrice) : 0,
        enrollmentPackageBv: Number.isFinite(Number(user?.enrollmentPackageBv)) ? Number(user.enrollmentPackageBv) : 0,
        starterPersonalPv: Number.isFinite(Number(user?.starterPersonalPv)) ? Number(user.starterPersonalPv) : 0,
        starterTotalCycles: Number.isFinite(Number(user?.starterTotalCycles)) ? Number(user.starterTotalCycles) : 0,
        createdAt: typeof user?.createdAt === 'string' ? user.createdAt : '',
        rank: typeof user?.rank === 'string' ? user.rank : '',
        accountRank: typeof user?.accountRank === 'string' ? user.accountRank : '',
        activityActiveUntilAt: typeof user?.activityActiveUntilAt === 'string' ? user.activityActiveUntilAt : '',
        lastProductPurchaseAt: typeof user?.lastProductPurchaseAt === 'string' ? user.lastProductPurchaseAt : '',
        lastPurchaseAt: typeof user?.lastPurchaseAt === 'string' ? user.lastPurchaseAt : '',
        authToken: typeof user?.authToken === 'string' ? user.authToken : '',
        authTokenExpiresAt: typeof user?.authTokenExpiresAt === 'string' ? user.authTokenExpiresAt : '',
      };

      const serializedSession = JSON.stringify(sessionUser);
      const wroteLocal = safeStorageSet(window.localStorage, AUTH_STORAGE_KEY, serializedSession);
      const wroteSession = safeStorageSet(window.sessionStorage, AUTH_STORAGE_KEY, serializedSession);
      const wroteCookie = writeCookieValue(AUTH_COOKIE_KEY, serializedSession);
      if (!wroteLocal && !wroteSession && !wroteCookie) {
        throw new Error('AUTH_STORAGE_UNAVAILABLE');
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function hideSetupPanel() {
      if (!setupPanelElement || !setupLinkElement) {
        return;
      }
      setupPanelElement.classList.add('hidden');
      setupLinkElement.href = '#';
      setupLinkElement.textContent = '';
    }

    function hideError() {
      if (!errorElement) {
        return;
      }
      errorElement.textContent = '';
      errorElement.classList.add('hidden');
      hideSetupPanel();
    }

    function showError(message) {
      if (!errorElement) {
        return;
      }
      errorElement.textContent = message;
      errorElement.classList.remove('hidden');
    }

    function showPasswordSetupRequiredError(message, setupLink) {
      const normalizedMessage = normalizeText(message) || 'Password setup required.';
      const normalizedSetupLink = normalizeText(setupLink);
      if (!/^\/(?:password-setup|store-password-setup)\.html\?token=/.test(normalizedSetupLink)) {
        showError(normalizedMessage);
        return;
      }

      if (errorElement) {
        errorElement.innerHTML = `${escapeHtml(normalizedMessage)} <a href="${escapeHtml(normalizedSetupLink)}" class="underline text-rose-700 hover:text-rose-600">Open setup link</a>`;
        errorElement.classList.remove('hidden');
      }

      if (setupPanelElement && setupLinkElement) {
        setupPanelElement.classList.remove('hidden');
        setupLinkElement.href = normalizedSetupLink;
        setupLinkElement.textContent = normalizedSetupLink;
      }
    }

    function showMemberLoginRedirectError() {
      if (!errorElement) {
        return;
      }
      errorElement.innerHTML = `Paid member accounts sign in from Member Login. <a href="/login.html" class="underline text-rose-700 hover:text-rose-600">Go to Member Login</a>`;
      errorElement.classList.remove('hidden');
    }

    function setBusy(isBusy) {
      identifierInputElement.disabled = isBusy;
      passwordInputElement.disabled = isBusy;
      submitButtonElement.disabled = isBusy;
      submitButtonElement.textContent = isBusy ? 'Signing In...' : 'Sign In';
    }

    async function authenticateUser(identifier, password) {
      const response = await fetch('/api/member-auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          identifier,
          password,
        }),
      });

      const payload = await response.json().catch(() => ({}));
      if (response.ok && payload?.user) {
        return payload.user;
      }

      const loginError = new Error(
        typeof payload?.error === 'string'
          ? payload.error
          : `Sign-in failed (${response.status}).`,
      );
      loginError.code = typeof payload?.code === 'string' ? payload.code : '';
      loginError.setupLink = typeof payload?.setupLink === 'string' ? payload.setupLink : '';
      throw loginError;
    }

    function resolveStoreScopedUrl(pathname) {
      const params = new URLSearchParams(window.location.search);
      const storeCode = normalizeStoreCode(params.get('store'));
      const url = new URL(pathname, window.location.origin);
      if (storeCode) {
        url.searchParams.set('store', storeCode);
      }
      return `${url.pathname}${url.search}`;
    }

    function bindStoreLinks() {
      const storeUrl = resolveStoreScopedUrl('/store.html');
      if (brandHomeLinkElement) {
        brandHomeLinkElement.href = storeUrl;
      }
      if (headerStoreLinkElement) {
        headerStoreLinkElement.href = storeUrl;
      }
    }

    const existingSession = readUserSession();
    if (existingSession) {
      const accountLabel = normalizeText(existingSession?.name || existingSession?.username || existingSession?.email || 'current account');
      if (accountLabel) {
        showError(`Currently signed in as ${accountLabel}. Sign in below to switch accounts.`);
      }
    }

    [identifierInputElement, passwordInputElement].forEach((input) => {
      input.addEventListener('input', hideError);
    });

    formElement.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideError();

      const identifier = normalizeCredential(identifierInputElement.value);
      const password = String(passwordInputElement.value || '');
      if (!identifier || !password) {
        showError('Enter your username/email and password.');
        return;
      }

      setBusy(true);
      try {
        const user = await authenticateUser(identifier, password);
        if (!isFreeAccountUser(user)) {
          showMemberLoginRedirectError();
          return;
        }
        persistUserSession(user);
        formElement.reset();
        window.location.replace(resolveStoreScopedUrl('/store-dashboard.html'));
      } catch (error) {
        if (error instanceof Error && error.message === 'AUTH_STORAGE_UNAVAILABLE') {
          showError('Sign-in blocked by browser storage settings. Disable private mode and retry.');
        } else if (error instanceof Error && error.code === 'PASSWORD_SETUP_REQUIRED') {
          showPasswordSetupRequiredError(error.message, error.setupLink);
        } else {
          showError(error instanceof Error ? error.message : 'Unable to sign in.');
        }
      } finally {
        setBusy(false);
      }
    });

    bindStoreLinks();
    identifierInputElement.focus();
  </script>
</body>
</html>
