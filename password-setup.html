<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="dark"/>
  <title>Premiere Life - Set Password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              400: '#1AFFB6',
              500: '#0FD4A4',
            },
            surface: {
              base: '#0A0F14',
              raised: '#111920',
              border: '#2A3A4A',
            },
            text: {
              primary: '#F0F4F8',
              secondary: '#A0B4C8',
              tertiary: '#6B8299',
              inverse: '#0A0F14',
            },
            semantic: {
              success: '#10E4A0',
              'success-bg': 'rgba(16,228,160,0.1)',
              danger: '#F45B69',
              'danger-bg': 'rgba(244,91,105,0.1)',
            },
          },
          fontFamily: {
            display: ['"DM Serif Display"', 'serif'],
            body: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'depth-3': '0 4px 8px rgba(15,212,164,0.08), 0 16px 48px rgba(0,0,0,0.45), 0 1px 0 rgba(15,212,164,0.1) inset',
          },
          transitionTimingFunction: {
            spring: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
          },
        },
      },
    };
  </script>

  <style type="text/tailwindcss">
    @layer utilities {
      .grain::before {
        content: '';
        position: absolute;
        inset: 0;
        filter: url(#grain);
        opacity: 0.03;
        pointer-events: none;
        z-index: 1;
        mix-blend-mode: overlay;
      }
    }
  </style>
  <style>
    :root {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      text-rendering: optimizeLegibility;
      font-synthesis: none;
    }
  </style>
</head>
<body class="bg-surface-base text-text-primary font-body min-h-screen">
  <svg class="hidden" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </svg>

  <div class="relative min-h-screen grain flex items-center justify-center px-4 py-10" style="background-image:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(15,212,164,0.07) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(91,184,244,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(167,139,250,0.03) 0%, transparent 60%);">
    <div class="absolute inset-0 bg-surface-base/80 backdrop-blur-sm"></div>

    <section class="relative w-full max-w-md rounded-2xl border border-surface-border bg-surface-raised/95 p-7 sm:p-8 shadow-depth-3">
      <div class="flex items-center gap-3 mb-6">
        <span class="inline-flex h-11 w-11 items-center justify-center rounded-xl bg-brand-500/15 border border-brand-500/30">
          <svg class="w-6 h-6 text-brand-400" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 3L5.5 8.2v7.3c0 6.8 4.2 13.1 10.5 15.2 6.3-2.1 10.5-8.4 10.5-15.2V8.2L16 3z"/>
            <path d="M17.3 10.5L12.3 17h4.2l-1.7 4.5 5-6.6h-4.1l1.6-4.4z"/>
          </svg>
        </span>
        <div>
          <h1 class="font-body font-semibold text-2xl text-text-primary">Set Your Password</h1>
          <p class="text-sm text-text-tertiary">Complete your member onboarding</p>
        </div>
      </div>

      <p id="setup-context" class="hidden rounded-lg border border-surface-border bg-surface-base/40 px-3 py-2 text-sm text-text-secondary"></p>
      <p id="setup-status" class="hidden mt-3 rounded-lg border px-3 py-2 text-sm" role="status"></p>

      <form id="password-setup-form" class="hidden mt-5 space-y-4" novalidate>
        <div>
          <label for="setup-new-password" class="block text-sm text-text-secondary mb-1.5">New Password</label>
          <input
            id="setup-new-password"
            name="newPassword"
            type="password"
            autocomplete="new-password"
            placeholder="Enter new password"
            class="w-full rounded-lg border border-surface-border bg-surface-base px-3 py-2.5 text-[16px] sm:text-sm text-text-primary placeholder-text-tertiary focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
            required
          />
        </div>

        <div>
          <label for="setup-confirm-password" class="block text-sm text-text-secondary mb-1.5">Confirm Password</label>
          <input
            id="setup-confirm-password"
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            placeholder="Confirm new password"
            class="w-full rounded-lg border border-surface-border bg-surface-base px-3 py-2.5 text-[16px] sm:text-sm text-text-primary placeholder-text-tertiary focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
            required
          />
        </div>

        <p class="text-xs text-text-tertiary">
          Password must be at least 8 characters and include uppercase, lowercase, number, and symbol.
        </p>

        <button
          id="password-setup-submit"
          type="submit"
          class="w-full rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-medium text-text-inverse transition-transform duration-150 ease-spring hover:bg-brand-400 active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-500/50 disabled:cursor-not-allowed disabled:opacity-70"
        >
          Set Password
        </button>
      </form>

      <a
        id="password-setup-login-link"
        href="./login.html"
        class="hidden mt-5 inline-flex w-full items-center justify-center rounded-lg border border-surface-border bg-surface-base px-4 py-2.5 text-sm text-text-secondary transition-transform duration-150 ease-spring hover:text-text-primary hover:bg-surface-base/70 active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-500/50"
      >
        Go to Login
      </a>
    </section>
  </div>

  <script>
    const setupForm = document.getElementById('password-setup-form');
    const setupContext = document.getElementById('setup-context');
    const setupStatus = document.getElementById('setup-status');
    const setupSubmitButton = document.getElementById('password-setup-submit');
    const setupNewPasswordInput = document.getElementById('setup-new-password');
    const setupConfirmPasswordInput = document.getElementById('setup-confirm-password');
    const setupLoginLink = document.getElementById('password-setup-login-link');

    const setupQueryParams = new URLSearchParams(window.location.search);
    const setupToken = setupQueryParams.get('token') || '';
    const setupEmail = setupQueryParams.get('email') || '';
    const setupAudience = String(setupQueryParams.get('audience') || '').trim().toLowerCase();

    function resolveLoginUrlByAudience(audience) {
      if (String(audience || '').trim().toLowerCase() === 'free') {
        return '/store-login.html';
      }
      return '/login.html';
    }

    function buildSetupUrl(pathname, token, email, audience) {
      const targetUrl = new URL(pathname, window.location.origin);
      targetUrl.searchParams.set('token', String(token || '').trim());
      const normalizedEmail = String(email || '').trim();
      if (normalizedEmail) {
        targetUrl.searchParams.set('email', normalizedEmail);
      }
      const normalizedAudience = String(audience || '').trim().toLowerCase();
      if (normalizedAudience) {
        targetUrl.searchParams.set('audience', normalizedAudience);
      }
      return `${targetUrl.pathname}${targetUrl.search}`;
    }

    function showStatus(message, type = 'info') {
      setupStatus.textContent = message;
      setupStatus.classList.remove(
        'hidden',
        'border-surface-border',
        'bg-surface-base/40',
        'text-text-secondary',
        'border-semantic-success/40',
        'bg-semantic-success-bg',
        'text-semantic-success',
        'border-semantic-danger/40',
        'bg-semantic-danger-bg',
        'text-semantic-danger',
      );

      if (type === 'success') {
        setupStatus.classList.add('border-semantic-success/40', 'bg-semantic-success-bg', 'text-semantic-success');
        return;
      }

      if (type === 'error') {
        setupStatus.classList.add('border-semantic-danger/40', 'bg-semantic-danger-bg', 'text-semantic-danger');
        return;
      }

      setupStatus.classList.add('border-surface-border', 'bg-surface-base/40', 'text-text-secondary');
    }

    function setSetupBusy(isBusy) {
      setupNewPasswordInput.disabled = isBusy;
      setupConfirmPasswordInput.disabled = isBusy;
      setupSubmitButton.disabled = isBusy;
      setupSubmitButton.textContent = isBusy ? 'Saving...' : 'Set Password';
    }

    async function loadSetupLinkStatus() {
      if (!setupToken) {
        showStatus('Missing setup token. Use the link from your email.', 'error');
        return;
      }

      try {
        const requestQuery = new URLSearchParams();
        requestQuery.set('token', setupToken);
        if (setupEmail) {
          requestQuery.set('email', setupEmail);
        }

        const response = await fetch(`/api/member-auth/setup-password?${requestQuery.toString()}`, { cache: 'no-store' });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          const recoverySetupLink = String(payload?.setupLink || '').trim();
          if (recoverySetupLink && /^\/(?:password-setup|store-password-setup)\.html\?token=/.test(recoverySetupLink)) {
            showStatus('Refreshing your setup link...', 'info');
            window.location.replace(recoverySetupLink);
            return;
          }

          const errorMessage = typeof payload?.error === 'string' ? payload.error : 'Invalid password setup link.';
          showStatus(errorMessage, 'error');
          return;
        }

        const payloadAudience = String(payload?.accountAudience || setupAudience || 'member').trim().toLowerCase();
        if (payloadAudience === 'free') {
          showStatus('Redirecting to Free Account setup...', 'info');
          window.location.replace(buildSetupUrl('/store-password-setup.html', setupToken, setupEmail, 'free'));
          return;
        }

        const label = `${payload?.accountName || payload?.username || 'Member'} (${payload?.email || 'email unavailable'})`;
        setupContext.textContent = `Setting password for: ${label}`;
        setupContext.classList.remove('hidden');

        setupForm.classList.remove('hidden');
        setupLoginLink.href = resolveLoginUrlByAudience(payloadAudience);
        showStatus('Create your password to activate your account.', 'info');
        setupNewPasswordInput.focus();
      } catch {
        showStatus('Unable to verify setup link right now.', 'error');
      }
    }

    setupForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const newPassword = String(setupNewPasswordInput.value || '');
      const confirmPassword = String(setupConfirmPasswordInput.value || '');

      if (!newPassword || !confirmPassword) {
        showStatus('Enter and confirm your new password.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showStatus('Password confirmation does not match.', 'error');
        return;
      }

      setSetupBusy(true);
      try {
        const response = await fetch('/api/member-auth/setup-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            token: setupToken,
            newPassword,
            confirmPassword,
          }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const errorMessage = typeof payload?.error === 'string' ? payload.error : 'Unable to set password.';
          showStatus(errorMessage, 'error');
          return;
        }

        showStatus('Password created successfully. You can now sign in.', 'success');
        setupForm.classList.add('hidden');
        setupLoginLink.classList.remove('hidden');
      } catch {
        showStatus('Unable to set password right now. Try again.', 'error');
      } finally {
        setSetupBusy(false);
      }
    });

    loadSetupLinkStatus();
  </script>
</body>
</html>
