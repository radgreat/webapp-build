<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password - Premiere Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --line: #F0F0F2;
      --field: #E2E2E2;
      --placeholder: #444444;
      --ink: #0F0F10;
      --muted: #4E4E50;
      --btn: #077AFF;
      --ok-bg: #EAF4FF;
      --ok-ink: #1D4E8F;
      --danger-bg: #FFEFEF;
      --danger-ink: #A01F1F;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .hidden { display: none !important; }

    .topbar {
      height: 68px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
    }

    .topbar-inner {
      width: min(1240px, calc(100vw - 54px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand-icon {
      width: 29px;
      height: 29px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
    }

    .nav-link {
      color: #111;
      text-decoration: none;
      font-size: 15px;
      line-height: 1;
      letter-spacing: -0.015em;
      opacity: 0.92;
      transition: opacity 180ms cubic-bezier(.22,1,.36,1), transform 180ms cubic-bezier(.22,1,.36,1);
    }

    .nav-link:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    .page {
      min-height: calc(100vh - 68px);
      display: flex;
      justify-content: center;
      padding: 96px 18px 72px;
    }

    .content {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .heading {
      margin: 0;
      font-size: 56px;
      line-height: 1.04;
      letter-spacing: -0.035em;
      font-weight: 500;
      color: #111;
    }

    .subtext {
      margin: 16px auto 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.32;
      letter-spacing: -0.02em;
      font-weight: 500;
    }

    .setup-context {
      margin: 24px auto 0;
      width: min(520px, 100%);
      padding: 12px 14px;
      border-radius: 12px;
      background: #F5F6F8;
      color: #3B3E45;
      font-size: 14px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      text-align: left;
    }

    .setup-status {
      margin: 12px auto 0;
      width: min(520px, 100%);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      text-align: left;
    }

    .setup-status.is-info {
      background: #F5F6F8;
      color: #4A4E56;
    }

    .setup-status.is-success {
      background: var(--ok-bg);
      color: var(--ok-ink);
    }

    .setup-status.is-error {
      background: var(--danger-bg);
      color: var(--danger-ink);
    }

    .form-wrap {
      margin: 36px auto 0;
      width: 100%;
      max-width: 500px;
      display: grid;
      gap: 16px;
      text-align: left;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field-label {
      color: #2A2C31;
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      font-weight: 500;
    }

    .input {
      width: 100%;
      height: 56px;
      border: 0;
      border-radius: 15px;
      background: var(--field);
      color: #171717;
      padding: 0 18px;
      font-size: 16px;
      letter-spacing: -0.015em;
      font-family: inherit;
      font-weight: 400;
      outline: none;
      transition: box-shadow 180ms cubic-bezier(.22,1,.36,1), transform 180ms cubic-bezier(.22,1,.36,1);
    }

    .input::placeholder {
      color: var(--placeholder);
      opacity: 1;
      font-weight: 400;
    }

    .input:focus {
      box-shadow: 0 0 0 2px rgba(7,122,255,.22);
      transform: translateY(-1px);
    }

    .password-help {
      margin: 2px 0 0;
      color: #5A5E66;
      font-size: 13px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      font-weight: 500;
    }

    .primary-btn {
      width: 100%;
      height: 56px;
      border: 0;
      border-radius: 15px;
      margin-top: 8px;
      background: var(--btn);
      color: #FFFFFF;
      font-size: 22px;
      letter-spacing: -0.015em;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: filter 180ms cubic-bezier(.22,1,.36,1), transform 180ms cubic-bezier(.22,1,.36,1);
    }

    .primary-btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .primary-btn:focus-visible {
      outline: 2px solid rgba(7,122,255,.48);
      outline-offset: 2px;
    }

    .primary-btn:disabled {
      opacity: .66;
      cursor: default;
      transform: none;
      filter: none;
    }

    .secondary-link {
      width: 100%;
      max-width: 500px;
      height: 56px;
      border-radius: 15px;
      margin: 20px auto 0;
      border: 1px solid #D9DCE2;
      color: #202227;
      background: #FFFFFF;
      font-size: 18px;
      letter-spacing: -0.012em;
      font-family: inherit;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background-color 180ms cubic-bezier(.22,1,.36,1), transform 180ms cubic-bezier(.22,1,.36,1);
    }

    .secondary-link:hover {
      background: #F7F8FA;
      transform: translateY(-1px);
    }

    .secondary-link:focus-visible {
      outline: 2px solid rgba(7,122,255,.32);
      outline-offset: 2px;
    }

    @media (max-width: 920px) {
      .topbar-inner { width: min(1240px, calc(100vw - 26px)); }
      .top-left { gap: 12px; }
      .page { padding: 72px 14px 48px; }
      .heading { font-size: 44px; }
      .subtext { font-size: 19px; max-width: 500px; }
      .form-wrap { margin-top: 28px; max-width: 460px; gap: 14px; }
      .input, .primary-btn, .secondary-link { height: 50px; }
      .primary-btn { font-size: 18px; }
      .secondary-link { font-size: 16px; }
    }

    @media (max-width: 620px) {
      .topbar { height: 60px; }
      .topbar-inner { width: calc(100vw - 18px); }
      .top-left { gap: 10px; }
      .brand-icon { width: 24px; height: 24px; }
      .nav-link { font-size: 13px; }
      .page { min-height: calc(100vh - 60px); padding: 56px 12px 38px; }
      .heading { font-size: 34px; }
      .subtext { font-size: 16px; max-width: 340px; }
      .form-wrap { margin-top: 22px; max-width: 340px; gap: 11px; }
      .field-label { font-size: 13px; }
      .input, .primary-btn, .secondary-link { height: 46px; border-radius: 12px; }
      .input { font-size: 14px; }
      .primary-btn { font-size: 16px; }
      .secondary-link { font-size: 15px; }
      .setup-context, .setup-status { width: min(340px, 100%); font-size: 12px; }
      .password-help { font-size: 12px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="top-left">
        <a href="/store.html" aria-label="Store Home">
          <img class="brand-icon" src="/brand_assets/Logos/L&D Icon.svg" alt="L&D icon">
        </a>
        <a class="nav-link" href="/store.html">Store</a>
        <a class="nav-link" href="/">About Us</a>
        <a class="nav-link" href="/store-support.html">Support</a>
      </div>
      <a id="header-login-link" class="nav-link" href="/login.html">Login</a>
    </div>
  </header>

  <main class="page">
    <section class="content">
      <h1 class="heading">Set Your Password</h1>
      <p class="subtext">Complete your member onboarding by creating a secure password for your new account.</p>

      <p id="setup-context" class="setup-context hidden"></p>
      <p id="setup-status" class="setup-status hidden" role="status"></p>

      <form id="password-setup-form" class="form-wrap hidden" novalidate>
        <div class="field">
          <label for="setup-new-password" class="field-label">New Password</label>
          <input
            id="setup-new-password"
            name="newPassword"
            type="password"
            autocomplete="new-password"
            placeholder="Enter new password"
            class="input"
            required
          >
        </div>

        <div class="field">
          <label for="setup-confirm-password" class="field-label">Confirm Password</label>
          <input
            id="setup-confirm-password"
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            placeholder="Confirm new password"
            class="input"
            required
          >
        </div>

        <p class="password-help">Password must be at least 8 characters and include uppercase, lowercase, number, and symbol.</p>

        <button id="password-setup-submit" type="submit" class="primary-btn">Set Password</button>
      </form>

      <a id="password-setup-login-link" href="/login.html" class="secondary-link hidden">Go to Login</a>
    </section>
  </main>

  <script>
    const setupForm = document.getElementById('password-setup-form');
    const setupContext = document.getElementById('setup-context');
    const setupStatus = document.getElementById('setup-status');
    const setupSubmitButton = document.getElementById('password-setup-submit');
    const setupNewPasswordInput = document.getElementById('setup-new-password');
    const setupConfirmPasswordInput = document.getElementById('setup-confirm-password');
    const setupLoginLink = document.getElementById('password-setup-login-link');

    const setupQueryParams = new URLSearchParams(window.location.search);
    const setupToken = setupQueryParams.get('token') || '';
    const setupEmail = setupQueryParams.get('email') || '';
    const setupAudience = String(setupQueryParams.get('audience') || '').trim().toLowerCase();

    function resolveLoginUrlByAudience(audience) {
      return '/login.html';
    }

    function buildSetupUrl(pathname, token, email, audience) {
      const targetUrl = new URL(pathname, window.location.origin);
      targetUrl.searchParams.set('token', String(token || '').trim());
      const normalizedEmail = String(email || '').trim();
      if (normalizedEmail) {
        targetUrl.searchParams.set('email', normalizedEmail);
      }
      const normalizedAudience = String(audience || '').trim().toLowerCase();
      if (normalizedAudience) {
        targetUrl.searchParams.set('audience', normalizedAudience);
      }
      return `${targetUrl.pathname}${targetUrl.search}`;
    }

    function showStatus(message, type = 'info') {
      if (!setupStatus) {
        return;
      }

      setupStatus.textContent = String(message || '').trim();
      setupStatus.classList.remove('hidden', 'is-info', 'is-success', 'is-error');

      if (type === 'success') {
        setupStatus.classList.add('is-success');
        return;
      }

      if (type === 'error') {
        setupStatus.classList.add('is-error');
        return;
      }

      setupStatus.classList.add('is-info');
    }

    function setSetupBusy(isBusy) {
      if (setupNewPasswordInput) {
        setupNewPasswordInput.disabled = isBusy;
      }
      if (setupConfirmPasswordInput) {
        setupConfirmPasswordInput.disabled = isBusy;
      }
      if (setupSubmitButton) {
        setupSubmitButton.disabled = isBusy;
        setupSubmitButton.textContent = isBusy ? 'Saving...' : 'Set Password';
      }
    }

    async function loadSetupLinkStatus() {
      if (!setupToken) {
        showStatus('Missing setup token. Use the link from your email.', 'error');
        return;
      }

      try {
        const requestQuery = new URLSearchParams();
        requestQuery.set('token', setupToken);
        if (setupEmail) {
          requestQuery.set('email', setupEmail);
        }

        const response = await fetch(`/api/member-auth/setup-password?${requestQuery.toString()}`, { cache: 'no-store' });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          const recoverySetupLink = String(payload?.setupLink || '').trim();
          if (recoverySetupLink && /^\/(?:password-setup|store-password-setup)\.html\?token=/.test(recoverySetupLink)) {
            showStatus('Refreshing your setup link...', 'info');
            window.location.replace(recoverySetupLink);
            return;
          }

          const errorMessage = typeof payload?.error === 'string' ? payload.error : 'Invalid password setup link.';
          showStatus(errorMessage, 'error');
          return;
        }

        const payloadAudience = String(payload?.accountAudience || setupAudience || 'member').trim().toLowerCase();
        if (payloadAudience === 'free') {
          showStatus('Redirecting to Free Account setup...', 'info');
          window.location.replace(buildSetupUrl('/store-password-setup.html', setupToken, setupEmail, 'free'));
          return;
        }

        const label = `${payload?.accountName || payload?.username || 'Member'} (${payload?.email || 'email unavailable'})`;
        setupContext.textContent = `Setting password for: ${label}`;
        setupContext.classList.remove('hidden');

        setupForm.classList.remove('hidden');
        setupLoginLink.href = resolveLoginUrlByAudience(payloadAudience);
        showStatus('Create your password to activate your account.', 'info');
        setupNewPasswordInput.focus();
      } catch {
        showStatus('Unable to verify setup link right now.', 'error');
      }
    }

    setupForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const newPassword = String(setupNewPasswordInput.value || '');
      const confirmPassword = String(setupConfirmPasswordInput.value || '');

      if (!newPassword || !confirmPassword) {
        showStatus('Enter and confirm your new password.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showStatus('Password confirmation does not match.', 'error');
        return;
      }

      setSetupBusy(true);
      try {
        const response = await fetch('/api/member-auth/setup-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            token: setupToken,
            newPassword,
            confirmPassword,
          }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const errorMessage = typeof payload?.error === 'string' ? payload.error : 'Unable to set password.';
          showStatus(errorMessage, 'error');
          return;
        }

        showStatus('Password created successfully. You can now sign in.', 'success');
        setupForm.classList.add('hidden');
        setupLoginLink.classList.remove('hidden');
      } catch {
        showStatus('Unable to set password right now. Try again.', 'error');
      } finally {
        setSetupBusy(false);
      }
    });

    loadSetupLinkStatus();
  </script>
</body>
</html>
