<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binary Tree Next</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_left_alt" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=low_priority" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=asterisk" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=keyboard_double_arrow_left" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=keyboard_double_arrow_right" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #E9EAEE;
      font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    #figma-tree-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    #figma-tree-canvas.dragging {
      cursor: grabbing;
    }

    #boot-error {
      position: fixed;
      left: 12px;
      bottom: 12px;
      max-width: 420px;
      border: 1px solid rgba(255, 99, 132, 0.42);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(50, 20, 28, 0.9);
      color: #ffc2cf;
      font-size: 12px;
      letter-spacing: 0.01em;
      display: none;
      z-index: 10;
    }

    #binary-tree-loading {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #E9EAEE;
      opacity: 1;
      transition: opacity 260ms ease;
    }

    #binary-tree-loading.is-leaving {
      opacity: 0;
      pointer-events: none;
    }

    .binary-tree-loading-card {
      width: min(420px, calc(100vw - 48px));
      border-radius: 24px;
      border: 1px solid #E2E4E9;
      background: #FFFFFF;
      padding: 20px 20px 18px;
      box-shadow: 0 16px 34px rgba(48, 48, 48, 0.08);
    }

    .binary-tree-loading-title {
      margin: 0;
      color: #303030;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .binary-tree-loading-subtitle {
      margin: 6px 0 0;
      color: #656A74;
      font-size: 12px;
      font-weight: 500;
    }

    .binary-tree-loading-track {
      position: relative;
      margin-top: 14px;
      height: 8px;
      border-radius: 999px;
      background: #EDEDED;
      overflow: hidden;
    }

    .binary-tree-loading-bar {
      position: absolute;
      inset: 0;
      width: 40%;
      border-radius: inherit;
      background: #C9CCD3;
      transform: translateX(-110%);
      animation: binary-tree-loading-slide 1.05s cubic-bezier(0.34, 1, 0.64, 1) infinite;
    }

    @keyframes binary-tree-loading-slide {
      0% {
        transform: translateX(-110%);
      }
      100% {
        transform: translateX(320%);
      }
    }
  </style>
</head>
<body>
  <canvas id="figma-tree-canvas"></canvas>
  <div id="binary-tree-loading" role="status" aria-live="polite">
    <div class="binary-tree-loading-card">
      <p class="binary-tree-loading-title">Loading Binary Tree</p>
      <p class="binary-tree-loading-subtitle">Preparing nodes and camera state...</p>
      <div class="binary-tree-loading-track" aria-hidden="true">
        <div class="binary-tree-loading-bar"></div>
      </div>
    </div>
  </div>
  <div id="boot-error"></div>
  <script type="module" src="/binary-tree-next-app.mjs"></script>
</body>
</html>
