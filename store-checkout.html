<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Preferred Store</title>
  <script>
    (function redirectToPreferredStore() {
      var currentUrl = new URL(window.location.href);
      var destination = new URL('/store.html', window.location.origin);
      currentUrl.searchParams.forEach(function (value, key) {
        destination.searchParams.set(key, value);
      });
      destination.hash = currentUrl.hash;
      window.location.replace(destination.pathname + destination.search + destination.hash);
    })();
  </script>
</head>
<body>
  <p>Redirecting to the Preferred Store experience...</p>
</body>
</html>
