<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Setup - Premiere Life</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between gap-4">
        <a id="brand-home-link" href="/store.html" class="inline-flex items-center"><img src="/brand_assets/Logos/L%26D%20Logo_Cropped.png" alt="L&D logo" class="h-10 w-auto"></a>

        <a id="header-login-link" href="/store-login.html" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 transition hover:border-emerald-300 hover:text-emerald-700 sm:text-sm">Free Member Login</a>
      </div>
    </div>
  </header>

  <main class="mx-auto flex min-h-[calc(100dvh-82px)] w-full max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
    <section class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-7">
      <div>
        <p class="text-xs font-semibold uppercase tracking-wide text-emerald-600">Free Account Onboarding</p>
        <h1 class="mt-1 text-2xl font-bold text-slate-900">Create your password</h1>
        <p class="mt-2 text-sm text-slate-600">Use the setup link from checkout or login to activate your Free Account.</p>
      </div>

      <p id="setup-context" class="mt-4 hidden rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700"></p>
      <p id="setup-status" class="mt-4 hidden rounded-lg border px-3 py-2 text-sm" role="status"></p>

      <form id="password-setup-form" class="mt-5 hidden space-y-3" novalidate>
        <div>
          <label for="setup-new-password" class="text-xs font-semibold uppercase tracking-wide text-slate-500">New Password</label>
          <input id="setup-new-password" name="newPassword" type="password" autocomplete="new-password" required placeholder="Enter new password" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200">
        </div>

        <div>
          <label for="setup-confirm-password" class="text-xs font-semibold uppercase tracking-wide text-slate-500">Confirm Password</label>
          <input id="setup-confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required placeholder="Confirm new password" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200">
        </div>

        <p class="text-xs text-slate-500">
          Password must be at least 8 characters and include uppercase, lowercase, number, and symbol.
        </p>

        <button id="password-setup-submit" type="submit" class="w-full rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-emerald-500 disabled:cursor-not-allowed disabled:opacity-50">Set Password</button>
      </form>

      <a id="password-setup-login-link" href="/store-login.html" class="mt-5 hidden w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-center text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Go to Free Member Login</a>
    </section>
  </main>

  <script>
    const setupForm = document.getElementById('password-setup-form');
    const setupContext = document.getElementById('setup-context');
    const setupStatus = document.getElementById('setup-status');
    const setupSubmitButton = document.getElementById('password-setup-submit');
    const setupNewPasswordInput = document.getElementById('setup-new-password');
    const setupConfirmPasswordInput = document.getElementById('setup-confirm-password');
    const setupLoginLink = document.getElementById('password-setup-login-link');
    const headerLoginLink = document.getElementById('header-login-link');
    const brandHomeLink = document.getElementById('brand-home-link');

    const setupQueryParams = new URLSearchParams(window.location.search);
    const setupToken = String(setupQueryParams.get('token') || '').trim();
    const setupEmail = String(setupQueryParams.get('email') || '').trim();
    const setupAudience = String(setupQueryParams.get('audience') || '').trim().toLowerCase();

    function normalizeText(value) {
      return String(value || '').trim();
    }

    function normalizeStoreCode(value) {
      return normalizeText(value).toUpperCase().replace(/[^A-Z0-9-]/g, '');
    }

    function resolveStoreScopedUrl(pathname) {
      const storeCode = normalizeStoreCode(setupQueryParams.get('store'));
      const url = new URL(pathname, window.location.origin);
      if (storeCode) {
        url.searchParams.set('store', storeCode);
      }
      return `${url.pathname}${url.search}`;
    }

    function buildSetupUrl(pathname, token, email, audience) {
      const targetUrl = new URL(pathname, window.location.origin);
      targetUrl.searchParams.set('token', normalizeText(token));
      const normalizedEmail = normalizeText(email);
      if (normalizedEmail) {
        targetUrl.searchParams.set('email', normalizedEmail);
      }
      const normalizedAudience = normalizeText(audience).toLowerCase();
      if (normalizedAudience) {
        targetUrl.searchParams.set('audience', normalizedAudience);
      }
      return `${targetUrl.pathname}${targetUrl.search}`;
    }

    function syncHeaderLinks() {
      if (headerLoginLink) {
        headerLoginLink.href = resolveStoreScopedUrl('/store-login.html');
      }
      if (setupLoginLink) {
        setupLoginLink.href = resolveStoreScopedUrl('/store-login.html');
      }
      if (brandHomeLink) {
        brandHomeLink.href = resolveStoreScopedUrl('/store.html');
      }
    }

    function showStatus(message, type = 'info') {
      setupStatus.textContent = message;
      setupStatus.classList.remove(
        'hidden',
        'border-slate-200',
        'bg-slate-50',
        'text-slate-700',
        'border-emerald-300',
        'bg-emerald-50',
        'text-emerald-700',
        'border-rose-300',
        'bg-rose-50',
        'text-rose-700',
      );

      if (type === 'success') {
        setupStatus.classList.add('border-emerald-300', 'bg-emerald-50', 'text-emerald-700');
      } else if (type === 'error') {
        setupStatus.classList.add('border-rose-300', 'bg-rose-50', 'text-rose-700');
      } else {
        setupStatus.classList.add('border-slate-200', 'bg-slate-50', 'text-slate-700');
      }

      setupStatus.classList.remove('hidden');
    }

    function setSetupBusy(isBusy) {
      setupNewPasswordInput.disabled = isBusy;
      setupConfirmPasswordInput.disabled = isBusy;
      setupSubmitButton.disabled = isBusy;
      setupSubmitButton.textContent = isBusy ? 'Saving...' : 'Set Password';
    }

    async function loadSetupLinkStatus() {
      if (!setupToken) {
        showStatus('Missing setup token. Use the link from checkout or login.', 'error');
        return;
      }

      try {
        const requestQuery = new URLSearchParams();
        requestQuery.set('token', setupToken);
        if (setupEmail) {
          requestQuery.set('email', setupEmail);
        }

        const response = await fetch(`/api/member-auth/setup-password?${requestQuery.toString()}`, { cache: 'no-store' });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          const recoverySetupLink = normalizeText(payload?.setupLink);
          if (recoverySetupLink && /^\/(?:password-setup|store-password-setup)\.html\?token=/.test(recoverySetupLink)) {
            showStatus('Refreshing your setup link...', 'info');
            window.location.replace(recoverySetupLink);
            return;
          }

          const errorMessage = typeof payload?.error === 'string' ? payload.error : 'Invalid password setup link.';
          showStatus(errorMessage, 'error');
          return;
        }

        const payloadAudience = String(payload?.accountAudience || setupAudience || 'free').trim().toLowerCase();
        if (payloadAudience === 'member') {
          showStatus('Redirecting to member setup...', 'info');
          window.location.replace(buildSetupUrl('/password-setup.html', setupToken, setupEmail, 'member'));
          return;
        }

        const accountLabel = `${payload?.accountName || payload?.username || 'Member'} (${payload?.email || 'email unavailable'})`;
        setupContext.textContent = `Setting password for: ${accountLabel}`;
        setupContext.classList.remove('hidden');

        setupForm.classList.remove('hidden');
        showStatus('Create your password to activate your Free Account.', 'info');
        setupNewPasswordInput.focus();
      } catch {
        showStatus('Unable to verify setup link right now.', 'error');
      }
    }

    setupForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const newPassword = normalizeText(setupNewPasswordInput.value);
      const confirmPassword = normalizeText(setupConfirmPasswordInput.value);

      if (!newPassword || !confirmPassword) {
        showStatus('Enter and confirm your new password.', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showStatus('Password confirmation does not match.', 'error');
        return;
      }

      setSetupBusy(true);
      try {
        const response = await fetch('/api/member-auth/setup-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            token: setupToken,
            newPassword,
            confirmPassword,
          }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const errorMessage = typeof payload?.error === 'string' ? payload.error : 'Unable to set password.';
          showStatus(errorMessage, 'error');
          return;
        }

        showStatus('Password created successfully. You can now sign in.', 'success');
        setupForm.classList.add('hidden');
        setupLoginLink.classList.remove('hidden');
      } catch {
        showStatus('Unable to set password right now. Try again.', 'error');
      } finally {
        setSetupBusy(false);
      }
    });

    syncHeaderLinks();
    loadSetupLinkStatus();
  </script>
</body>
</html>
